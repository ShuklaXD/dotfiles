# === General ===
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
# Send copies to the OUTER terminal's clipboard via OSC 52 (works over SSH, no X/xclip needed)
set -g set-clipboard on
set -ag terminal-overrides ",*:Ms=\\E]52;%p1%s;%p2%s\\7"
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g focus-events on
set -g status-interval 5

# === Splits ===
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# === Pane navigation (vim-style) ===
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# === Pane resizing ===
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# === Window navigation ===
bind -r n next-window
bind -r p previous-window

# === Copy mode (vi) ===
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
# Copy to tmux buffer (-> OSC 52 -> your local clipboard) and also xclip if an X server is present
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i >/dev/null 2>&1"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i >/dev/null 2>&1"

# === Reload config ===
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# === Status bar ===
set -g status-position bottom
set -g status-style "bg=#282828,fg=#ebdbb2"
set -g status-left-length 40
set -g status-right-length 60
set -g status-left "#[fg=#282828,bg=#a89984,bold] #S #[fg=#a89984,bg=#282828] "
set -g status-right "#[fg=#a89984] %H:%M #[fg=#282828,bg=#a89984,bold] #h "
setw -g window-status-format "#[fg=#a89984] #I:#W "
setw -g window-status-current-format "#[fg=#282828,bg=#fabd2f,bold] #I:#W "

# === Pane borders ===
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#fabd2f"

# === Messages ===
set -g message-style "bg=#fabd2f,fg=#282828,bold"
